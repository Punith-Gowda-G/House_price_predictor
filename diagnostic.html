<!DOCTYPE html>
<html>
<head><title>EstateIQ Diagnostic</title></head>
<body>
    <h1>Data Diagnostic</h1>
    <button onclick="check()">Check Analytics Data</button>
    <pre id="out" style="background:#eee; padding:10px; border:1px solid #ccc;"></pre>
    <script>
        async function check() {
            const out = document.getElementById('out');
            out.textContent = "Fetching...";
            try {
                const res = await fetch('/analytics_data');
                const data = await res.json();
                out.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                out.textContent = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
